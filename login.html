<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#c9a84c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Jcz — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider,
      signInWithPopup, signInWithEmailAndPassword,
      createUserWithEmailAndPassword, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ╔══════════════════════════════════════╗
    // ║   PASTE FIREBASE CONFIG LO DI SINI  ║
    // ╚══════════════════════════════════════╝
    const firebaseConfig = {
      apiKey:"AIzaSyBW6VBAEfWCgGf_QJ3aZ-u_tBOJ_skQ1LY", authDomain:"jczentertaiment.firebaseapp.com",
      projectId:"jczentertaiment", storageBucket:"jczentertaiment.firebasestorage.app",
      messagingSenderId:"162448831896", appId:"1:162448831896:web:29f4002b7780249481e7ed"
    };
    // ══════════════════════════════════════

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const gp   = new GoogleAuthProvider();

    // Kalau sudah login → langsung ke pilihan app
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'choose.html';
    });

    window.__fb = { auth, gp, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword };
    document.dispatchEvent(new Event('fbReady'));
  </script>

  <style>
    :root{
      --gold:#c9a84c;--gold-l:#e8c76a;--gold-d:#7a5e28;
      --bg:#080808;--bg2:#0f0f0f;--bg3:#151515;--bg4:#1c1c1c;
      --border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.07);
      --text:#e8e0d0;--text-dim:#8a8070;--text-muted:#3a3530;
      --red:#e05252;--r:6px;
      --fR:'Cinzel',serif;--fB:'Raleway',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--bg);color:var(--text);font-family:var(--fB);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:1rem;overflow:hidden;
    }

    /* particles */
    #pts{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .pt{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:flt linear infinite;}
    @keyframes flt{0%{transform:translateY(100vh) translateX(0);opacity:0;}10%{opacity:.5;}90%{opacity:.2;}100%{transform:translateY(-10vh) translateX(var(--dx));opacity:0;}}

    @keyframes scaleIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}

    .card{
      position:relative;z-index:1;
      background:linear-gradient(160deg,#141414,#0c0c0c);
      border:1px solid var(--border);border-radius:14px;
      padding:2.5rem 2rem;width:100%;max-width:400px;
      animation:scaleIn .35s ease;overflow:hidden;
    }
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
    .card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.06),transparent 65%);pointer-events:none;}

    /* logo */
    .logo{text-align:center;margin-bottom:1.75rem;}
    .logo-crown{font-size:1.6rem;display:block;animation:shimmer 3s ease-in-out infinite;filter:drop-shadow(0 0 10px var(--gold));}
    .logo-name{font-family:var(--fR);font-size:2rem;font-weight:900;color:var(--gold);letter-spacing:.2em;line-height:1;margin-top:.25rem;}
    .logo-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.6rem auto;}
    .logo-sub{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text-dim);}

    /* tabs */
    .tabs{display:flex;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:1.5rem;}
    .tab{flex:1;background:transparent;border:none;cursor:pointer;font-family:var(--fB);font-size:.75rem;letter-spacing:.08em;color:var(--text-dim);padding:.6rem;transition:all .2s;text-transform:uppercase;}
    .tab.active{background:var(--gold);color:#000;font-weight:700;}

    /* form */
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.38rem;}
    .form-input{
      width:100%;background:var(--bg3);border:1px solid var(--border2);
      border-radius:var(--r);padding:.72rem 1rem;
      color:var(--text);font-family:var(--fB);font-size:.88rem;outline:none;
      transition:border-color .2s;
    }
    .form-input:focus{border-color:var(--gold-d);}
    .form-input::placeholder{color:var(--text-muted);}

    /* buttons */
    .btn-main{
      width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-d));
      border:none;border-radius:var(--r);padding:.82rem;
      color:#000;font-family:var(--fR);font-size:.82rem;font-weight:700;
      letter-spacing:.12em;cursor:pointer;transition:all .2s;
      text-transform:uppercase;margin-bottom:1rem;
    }
    .btn-main:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.25);}
    .btn-main:active{transform:translateY(0);}
    .btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .divider{display:flex;align-items:center;gap:.85rem;margin-bottom:1rem;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2);}
    .divider span{font-size:.65rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}

    .btn-google{
      width:100%;background:transparent;border:1px solid var(--border);
      border-radius:var(--r);padding:.75rem;color:var(--text);
      font-family:var(--fB);font-size:.84rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:.75rem;
      transition:all .2s;
    }
    .btn-google:hover{border-color:var(--gold-d);background:var(--bg3);}
    .btn-google:disabled{opacity:.5;cursor:not-allowed;}
    .g-icon{width:18px;height:18px;flex-shrink:0;}

    .err{font-size:.75rem;color:var(--red);text-align:center;margin-top:.75rem;min-height:1.1em;line-height:1.4;}

    /* loading spinner inside btn */
    .btn-spin{
      display:inline-block;width:14px;height:14px;border-radius:50%;
      border:2px solid rgba(0,0,0,.3);border-top-color:#000;
      animation:spin .7s linear infinite;vertical-align:middle;margin-right:.4rem;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-spin-w{border-color:rgba(255,255,255,.3);border-top-color:#fff;}
  </style>
</head>
<body>

<div id="pts"></div>

<div class="card">
  <div class="logo">
    <span class="logo-crown">♛</span>
    <div class="logo-name">JCZ</div>
    <div class="logo-line"></div>
    <div class="logo-sub">✦ Entertainment Platform ✦</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-in"  onclick="switchTab('in')">⊕ Masuk</button>
    <button class="tab"        id="tab-reg" onclick="switchTab('reg')">◈ Daftar</button>
  </div>

  <!-- LOGIN -->
  <div id="form-in">
    <div class="form-group">
      <label>✉ Email</label>
      <input type="email" id="in-email" class="form-input" placeholder="contoh@email.com"/>
    </div>
    <div class="form-group">
      <label>⊛ Password</label>
      <input type="password" id="in-pass" class="form-input" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-main" id="btn-login" onclick="doLogin()">▶ &nbsp;Masuk</button>
  </div>

  <!-- REGISTER -->
  <div id="form-reg" class="hidden">
    <div class="form-group">
      <label>✉ Email</label>
      <input type="email" id="reg-email" class="form-input" placeholder="contoh@email.com"/>
    </div>
    <div class="form-group">
      <label>⊛ Password</label>
      <input type="password" id="reg-pass" class="form-input" placeholder="Min. 6 karakter"
        onkeydown="if(event.key==='Enter')doRegister()"/>
    </div>
    <div class="form-group">
      <label>⊛ Konfirmasi Password</label>
      <input type="password" id="reg-pass2" class="form-input" placeholder="Ulangi password"
        onkeydown="if(event.key==='Enter')doRegister()"/>
    </div>
    <button class="btn-main" id="btn-reg" onclick="doRegister()">◈ &nbsp;Buat Akun</button>
  </div>

  <div class="divider"><span>atau</span></div>

  <button class="btn-google" id="btn-google" onclick="doGoogle()">
    <svg class="g-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Lanjut dengan Google
  </button>

  <div class="err" id="err-msg"></div>
</div>

<script>
// particles
const pts = document.getElementById('pts');
for(let i=0;i<25;i++){
  const p=document.createElement('div'); p.className='pt';
  const dx=(Math.random()-.5)*180+'px';
  const dur=9+Math.random()*12; const del=Math.random()*10;
  p.style.cssText=`left:${Math.random()*100}%;--dx:${dx};animation-duration:${dur}s;animation-delay:${del}s;`;
  pts.appendChild(p);
}

// hidden helper
HTMLElement.prototype._hide=function(){this.style.display='none';};
HTMLElement.prototype._show=function(d='block'){this.style.display=d;};

const $ = id => document.getElementById(id);

function switchTab(t){
  $('tab-in').classList.toggle('active',t==='in');
  $('tab-reg').classList.toggle('active',t==='reg');
  $('form-in').style.display  = t==='in'  ? 'block':'none';
  $('form-reg').style.display = t==='reg' ? 'block':'none';
  $('err-msg').textContent='';
}
// init hidden
$('form-reg').style.display='none';

function setLoading(btnId,loading,txt=''){
  const b=$( btnId);
  b.disabled=loading;
  if(loading) b.innerHTML=`<span class="btn-spin${btnId==='btn-google'?' btn-spin-w':''}"></span> Memuat...`;
  else b.innerHTML=txt;
}

function showErr(msg){ $('err-msg').textContent=msg; }

function friendly(code){
  const m={
    'auth/user-not-found':'Akun tidak ditemukan',
    'auth/wrong-password':'Password salah',
    'auth/invalid-credential':'Email atau password salah',
    'auth/email-already-in-use':'Email sudah terdaftar',
    'auth/weak-password':'Password terlalu lemah (min. 6 karakter)',
    'auth/invalid-email':'Format email tidak valid',
    'auth/popup-closed-by-user':'Login Google dibatalkan',
    'auth/network-request-failed':'Cek koneksi internet',
    'auth/too-many-requests':'Terlalu banyak percobaan, coba lagi nanti',
  };
  return m[code]||'Terjadi kesalahan, coba lagi';
}

document.addEventListener('fbReady', () => {
  window._fb = window.__fb;
});

async function doLogin(){
  if(!window.__fb){ showErr('⊛ Firebase belum dikonfigurasi'); return; }
  const email=$('in-email').value.trim();
  const pass =$('in-pass').value;
  if(!email||!pass){ showErr('✕ Isi email dan password'); return; }
  setLoading('btn-login',true);
  showErr('');
  try{
    await window.__fb.signInWithEmailAndPassword(window.__fb.auth,email,pass);
    window.location.href='choose.html';
  }catch(e){ showErr('✕ '+friendly(e.code)); setLoading('btn-login',false,'▶ &nbsp;Masuk'); }
}

async function doRegister(){
  if(!window.__fb){ showErr('⊛ Firebase belum dikonfigurasi'); return; }
  const email=$('reg-email').value.trim();
  const pass =$('reg-pass').value;
  const pass2=$('reg-pass2').value;
  if(!email||!pass){ showErr('✕ Isi semua kolom'); return; }
  if(pass!==pass2){ showErr('✕ Password tidak cocok'); return; }
  if(pass.length<6){ showErr('✕ Password min. 6 karakter'); return; }
  setLoading('btn-reg',true);
  showErr('');
  try{
    await window.__fb.createUserWithEmailAndPassword(window.__fb.auth,email,pass);
    window.location.href='choose.html';
  }catch(e){ showErr('✕ '+friendly(e.code)); setLoading('btn-reg',false,'◈ &nbsp;Buat Akun'); }
}

async function doGoogle(){
  if(!window.__fb){ showErr('⊛ Firebase belum dikonfigurasi'); return; }
  setLoading('btn-google',true);
  showErr('');
  try{
    await window.__fb.signInWithPopup(window.__fb.auth,window.__fb.gp);
    window.location.href='choose.html';
  }catch(e){ showErr('✕ '+friendly(e.code)); setLoading('btn-google',false,'<svg class="g-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Lanjut dengan Google'); }
}
</script>
</body>
</html>
