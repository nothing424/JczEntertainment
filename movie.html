<html lang="id">
<head>

  <script type="module">

    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    // ╔══ PASTE FIREBASE CONFIG DI SINI ══╗
    const firebaseConfig = {
      apiKey:"AIzaSyBW6VBAEfWCgGf_QJ3aZ-u_tBOJ_skQ1LY", authDomain:"jczentertaiment.firebaseapp.com",
      projectId:"jczentertaiment", storageBucket:"jczentertaiment.firebasestorage.app",
      messagingSenderId:"162448831896", appId:"1:162448831896:web:29f4002b7780249481e7ed"
    };
    // ╚════════════════════════════════════╝
    const auth = getAuth(initializeApp(firebaseConfig));
    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href="login.html"; return; }

      const av = document.getElementById("nav-user-av");
      if (av) { av.textContent=name.charAt(0).toUpperCase(); if(user.photoURL) av.innerHTML="<img src=""+user.photoURL+"" style="width:28px;height:28px;border-radius:50%;">" ; }
    });
    window.__logout = () => signOut(auth).then(()=>window.location.href="login.html");

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#c9a84c;--gold-l:#e8c76a;--gold-d:#7a5e28;
      --bg:#080808;--bg2:#0f0f0f;--bg3:#151515;--bg4:#1c1c1c;
      --border:rgba(201,168,76,.18);--border2:rgba(201,168,76,.07);
      --text:#e8e0d0;--text-dim:#8a8070;--text-muted:#3a3530;
      --red:#e05252;--r:6px;
      --fR:'Cinzel',serif;--fB:'Raleway',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--fB);min-height:100vh;overflow-x:hidden;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:var(--gold-d);border-radius:2px;}
    .hidden{display:none!important;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── NAVBAR ── */
    .navbar{
      position:sticky;top:0;z-index:100;height:58px;
      background:rgba(8,8,8,.95);backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border2);
      display:flex;align-items:center;padding:0 1.25rem;gap:1rem;
    }
    .nav-logo{
      font-family:var(--fR);font-size:1.1rem;font-weight:900;
      color:var(--gold);letter-spacing:.15em;text-decoration:none;
      display:flex;align-items:center;gap:.4rem;flex-shrink:0;
    }
    .nav-logo .lbox{
      width:26px;height:26px;background:linear-gradient(135deg,var(--gold),var(--gold-d));
      border-radius:4px;display:flex;align-items:center;justify-content:center;
      font-size:.85rem;color:#000;
    }
    .nav-tabs{
      display:flex;gap:0;border:1px solid var(--border2);border-radius:5px;overflow:hidden;flex-shrink:0;
    }
    .nav-tab{
      background:transparent;border:none;cursor:pointer;
      font-family:var(--fB);font-size:.72rem;letter-spacing:.07em;
      color:var(--text-dim);padding:.38rem .9rem;transition:all .2s;
      text-transform:uppercase;
    }
    .nav-tab.active{background:var(--gold);color:#000;font-weight:700;}
    .nav-search{flex:1;max-width:340px;position:relative;}
    .nav-search input{
      width:100%;background:var(--bg3);border:1px solid var(--border2);
      border-radius:20px;padding:.42rem .9rem .42rem 2.2rem;
      color:var(--text);font-family:var(--fB);font-size:.83rem;outline:none;
      transition:border-color .2s;
    }
    .nav-search input:focus{border-color:var(--gold-d);}
    .nav-search input::placeholder{color:var(--text-muted);}
    .nav-search .si{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.82rem;pointer-events:none;}
    .search-drop{
      position:absolute;top:calc(100% + 6px);left:0;right:0;
      background:var(--bg3);border:1px solid var(--border);border-radius:8px;
      overflow:hidden;z-index:200;max-height:340px;overflow-y:auto;
    }
    .sd-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .9rem;cursor:pointer;border-bottom:1px solid var(--border2);transition:background .15s;}
    .sd-item:last-child{border:none;}
    .sd-item:hover{background:var(--bg4);}
    .sd-item img{width:32px;height:46px;object-fit:cover;border-radius:3px;flex-shrink:0;}
    .sd-title{font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sd-meta{font-size:.68rem;color:var(--text-dim);margin-top:1px;}
    .nav-actions{display:flex;align-items:center;gap:.75rem;margin-left:auto;}
    .nav-home-btn{font-size:.7rem;color:var(--text-dim);background:transparent;border:1px solid var(--border2);border-radius:4px;padding:.3rem .7rem;cursor:pointer;font-family:var(--fB);letter-spacing:.08em;transition:all .2s;text-decoration:none;}
    .nav-home-btn:hover{color:var(--gold);border-color:var(--gold-d);}

    /* ── HERO ── */
    .hero{position:relative;height:500px;overflow:hidden;margin-bottom:1.5rem;}
    @media(max-width:600px){.hero{height:360px;}}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .8s;}
    .hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,8,.98) 0%,rgba(8,8,8,.65) 45%,rgba(8,8,8,.1) 70%,rgba(8,8,8,.4) 100%),linear-gradient(to top,rgba(8,8,8,1) 0%,transparent 38%);}
    .hero-content{position:absolute;bottom:0;left:0;padding:1.5rem 1.5rem 2.5rem;max-width:500px;animation:fadeIn .5s ease;}
    .hero-badge{display:inline-flex;align-items:center;gap:.35rem;background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:3px;padding:.2rem .65rem;font-size:.64rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem;}
    .hero-title{font-family:var(--fR);font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:700;line-height:1.2;margin-bottom:.6rem;color:var(--text);}
    .hero-meta{display:flex;align-items:center;gap:.85rem;flex-wrap:wrap;font-size:.75rem;color:var(--text-dim);margin-bottom:.85rem;}
    .hero-meta .sc{color:var(--gold);font-weight:700;}
    .hero-overview{font-size:.82rem;color:var(--text-dim);line-height:1.7;margin-bottom:1.25rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .hero-btns{display:flex;gap:.65rem;flex-wrap:wrap;}
    .btn-watch{display:flex;align-items:center;gap:.4rem;background:linear-gradient(135deg,var(--gold),#a07830);border:none;border-radius:var(--r);padding:.65rem 1.35rem;color:#000;font-weight:700;font-family:var(--fR);font-size:.76rem;letter-spacing:.1em;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .btn-watch:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.3);}
    .btn-add{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:var(--r);padding:.65rem 1.1rem;color:var(--text);font-size:.78rem;font-family:var(--fB);font-weight:500;cursor:pointer;transition:all .2s;}
    .btn-add:hover{background:rgba(255,255,255,.13);border-color:var(--gold-d);}
    .hero-dots{position:absolute;bottom:1rem;right:1.5rem;display:flex;gap:.45rem;}
    .hdot{width:22px;height:3px;border-radius:2px;background:rgba(255,255,255,.18);cursor:pointer;transition:all .3s;}
    .hdot.active{background:var(--gold);width:38px;}

    /* ── SECTIONS ── */
    .section{margin-bottom:2rem;padding:0 1.25rem;}
    .sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;}
    .sec-title{font-family:var(--fR);font-size:.95rem;font-weight:600;color:var(--text);letter-spacing:.07em;display:flex;align-items:center;gap:.4rem;}
    .sec-title::after{content:'';display:inline-block;width:24px;height:1.5px;background:var(--gold);margin-left:.35rem;}
    .movie-row{display:flex;gap:.75rem;overflow-x:auto;padding-bottom:.65rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
    .movie-row::-webkit-scrollbar{height:3px;}

    /* ── CARD ── */
    .mcard{flex-shrink:0;width:140px;scroll-snap-align:start;cursor:pointer;transition:transform .25s;position:relative;}
    @media(max-width:480px){.mcard{width:118px;}}
    .mcard:hover{transform:scale(1.05) translateY(-3px);}
    .mcard:hover .cov-ov{opacity:1;}
    .mposter{width:100%;aspect-ratio:2/3;border-radius:var(--r);object-fit:cover;background:var(--bg3);display:block;border:1px solid var(--border2);}
    .mposter-sk{width:100%;aspect-ratio:2/3;border-radius:var(--r);background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
    .cov-ov{position:absolute;inset:0;border-radius:var(--r);background:linear-gradient(to top,rgba(0,0,0,.9),transparent 55%);opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:.5rem;}
    .play-ic{width:34px;height:34px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-size:.8rem;font-weight:bold;}
    .cbadge{position:absolute;top:.35rem;left:.35rem;background:rgba(201,168,76,.9);color:#000;font-size:.55rem;font-weight:800;padding:.12rem .38rem;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;}
    .cscore{position:absolute;top:.35rem;right:.35rem;background:rgba(0,0,0,.75);color:var(--gold);font-size:.6rem;font-weight:700;padding:.12rem .38rem;border-radius:3px;}
    .cinfo{margin-top:.42rem;}
    .ctitle{font-size:.73rem;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .cmeta{font-size:.62rem;color:var(--text-dim);margin-top:.15rem;}

    /* ── WATCH MODAL ── */
    #watch-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.97);display:flex;flex-direction:column;animation:scaleIn .25s ease;overflow-y:auto;}
    .wm-header{display:flex;align-items:center;gap:.85rem;padding:.85rem 1.25rem;border-bottom:1px solid var(--border2);flex-shrink:0;}
    .wm-back{background:transparent;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;padding:.3rem;transition:color .2s;line-height:1;}
    .wm-back:hover{color:var(--gold);}
    .wm-title{font-family:var(--fR);font-size:.95rem;font-weight:600;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .wm-body{display:flex;flex:1;flex-direction:column;}
    @media(min-width:860px){.wm-body{flex-direction:row;}}
    .player-wrap{flex:1;min-width:0;background:#000;aspect-ratio:16/9;position:relative;}
    @media(min-width:860px){.player-wrap{aspect-ratio:auto;min-height:400px;}}
    .player-wrap iframe{width:100%;height:100%;border:none;}
    .player-info{
      width:100%;background:var(--bg2);
      border-top:1px solid var(--border2);padding:1.25rem;
      overflow-y:auto;
    }
    @media(min-width:860px){.player-info{width:300px;border-top:none;border-left:1px solid var(--border2);}}
    .pi-poster{width:80px;height:120px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border2);float:left;margin:0 1rem 1rem 0;}
    .pi-title{font-family:var(--fR);font-size:.95rem;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:.5rem;}
    .pi-meta{font-size:.72rem;color:var(--text-dim);margin-bottom:.75rem;display:flex;flex-wrap:wrap;gap:.5rem;}
    .pi-meta span{display:flex;align-items:center;gap:.25rem;}
    .pi-meta .sc{color:var(--gold);}
    .pi-genres{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem;clear:both;}
    .pi-genre{background:var(--bg4);border:1px solid var(--border2);border-radius:3px;padding:.1rem .42rem;font-size:.6rem;color:var(--text-dim);}
    .pi-overview{font-size:.76rem;color:var(--text-dim);line-height:1.7;}
    /* TV Episodes */
    .seasons-wrap{margin-top:1rem;border-top:1px solid var(--border2);padding-top:.85rem;}
    .season-label{font-family:var(--fR);font-size:.7rem;font-weight:600;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.5rem;}
    .season-tabs{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem;}
    .season-tab{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:.3rem .7rem;font-size:.7rem;color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:var(--fB);}
    .season-tab.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
    .ep-list{display:flex;flex-direction:column;gap:.35rem;max-height:260px;overflow-y:auto;}
    .ep-item{display:flex;align-items:center;gap:.6rem;padding:.5rem .6rem;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent;}
    .ep-item:hover{background:var(--bg3);}
    .ep-item.active{background:var(--bg3);border-color:var(--border);}
    .ep-num{width:24px;height:24px;background:var(--bg4);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:700;color:var(--text-dim);flex-shrink:0;}
    .ep-item.active .ep-num{background:var(--gold);color:#000;}
    .ep-info{flex:1;min-width:0;}
    .ep-ttl{font-size:.74rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ep-sub{font-size:.62rem;color:var(--text-dim);}
    .ep-play{color:var(--text-muted);font-size:.72rem;flex-shrink:0;}
    .ep-item:hover .ep-play,.ep-item.active .ep-play{color:var(--gold);}

    /* ── PAGES ── */
    #home-page{animation:fadeIn .3s ease;}
    #watchlist-page{padding:1.5rem 1.25rem;animation:fadeIn .3s ease;}
    .page-title{font-family:var(--fR);font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem;}
    .wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:.85rem;}
    .empty-state{text-align:center;padding:4rem 2rem;color:var(--text-dim);}
    .empty-icon{font-size:2.5rem;margin-bottom:.85rem;display:block;}
    #toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.55rem 1.1rem;font-size:.78rem;color:var(--text);z-index:9000;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .bnav{position:fixed;bottom:0;left:0;right:0;height:58px;background:rgba(10,10,10,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
    @media(min-width:768px){.bnav{display:none;}}
    .bn{display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;color:var(--text-muted);font-size:1.1rem;transition:color .2s;padding:.25rem .65rem;flex:1;}
    .bn span{font-size:.58rem;letter-spacing:.05em;}
    .bn.active{color:var(--gold);}
    .pb-spacer{height:68px;}
    @media(min-width:768px){.pb-spacer{height:0;}}
    .spin{width:30px;height:30px;border-radius:50%;border:3px solid var(--bg4);border-top-color:var(--gold);animation:spin .8s linear infinite;}
    .loading-ctr{display:flex;justify-content:center;align-items:center;padding:3rem;gap:1rem;color:var(--text-dim);font-size:.8rem;}
  </style>
</head>

<div id="main">
  <!-- HOME PAGE -->
  <div id="home-page">
    <div class="hero" id="hero">
      <div class="hero-bg" id="hero-bg"></div>
      <div class="hero-content" id="hero-content">

<script>
/* ═══════════════════════════════════════
   JczMovies — TMDB + Vidking Player
   Vidking embed: vidking.net/embed/movie/{tmdbId}
   Vidking TV:    vidking.net/embed/tv/{tmdbId}/{season}/{ep}
═══════════════════════════════════════ */

const TMDB_KEY = '8bfe77c8d7e9b065daaa7d0df65c003c';
const TMDB = 'https://api.themoviedb.org/3';
const IMG  = 'https://image.tmdb.org/t/p/w500';
const IMG_L= 'https://image.tmdb.org/t/p/w1280';
const VIDKING = 'https://www.vidking.net/embed';

let mode = 'movie'; // 'movie' | 'tv'
let watchlist = JSON.parse(localStorage.getItem('jcz_mv_wl') || '[]');
let heroItems = [], heroIdx = 0, heroTimer = null;
let searchDebounce = null;

const MOVIE_SECTIONS = [
  {key:'trending',   label:'🔥 Trending',       icon:'◉', url:`${TMDB}/trending/movie/week`},
  {key:'popular',    label:'⭐ Populer',          icon:'★', url:`${TMDB}/movie/popular`},
  {key:'top_rated',  label:'♛ Rating Tertinggi', icon:'♛', url:`${TMDB}/movie/top_rated`},
  {key:'action',     label:'⚔ Action',           icon:'⚔', url:`${TMDB}/discover/movie?with_genres=28`},
  {key:'horror',     label:'☠ Horror',           icon:'☠', url:`${TMDB}/discover/movie?with_genres=27`},
  {key:'comedy',     label:'◉ Comedy',           icon:'◉', url:`${TMDB}/discover/movie?with_genres=35`},
  {key:'animation',  label:'⬡ Animation',        icon:'⬡', url:`${TMDB}/discover/movie?with_genres=16`},
  {key:'sci-fi',     label:'◈ Sci-Fi',           icon:'◈', url:`${TMDB}/discover/movie?with_genres=878`},
  {key:'romance',    label:'♡ Romance',          icon:'♡', url:`${TMDB}/discover/movie?with_genres=10749`},
];

const TV_SECTIONS = [
  {key:'trending',   label:'🔥 Trending',        icon:'◉', url:`${TMDB}/trending/tv/week`},
  {key:'popular',    label:'⭐ Populer',           icon:'★', url:`${TMDB}/tv/popular`},
  {key:'top_rated',  label:'♛ Rating Tertinggi', icon:'♛', url:`${TMDB}/tv/top_rated`},
  {key:'action',     label:'⚔ Action & Adventure',icon:'⚔',url:`${TMDB}/discover/tv?with_genres=10759`},
  {key:'drama',      label:'◇ Drama',            icon:'◇', url:`${TMDB}/discover/tv?with_genres=18`},
  {key:'comedy',     label:'◉ Comedy',           icon:'◉', url:`${TMDB}/discover/tv?with_genres=35`},
  {key:'animation',  label:'⬡ Animation',        icon:'⬡', url:`${TMDB}/discover/tv?with_genres=16`},
  {key:'crime',      label:'⊛ Crime',            icon:'⊛', url:`${TMDB}/discover/tv?with_genres=80`},
  {key:'fantasy',    label:'✦ Fantasy',          icon:'✦', url:`${TMDB}/discover/tv?with_genres=10765`},
];

// ── INIT ──────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadPage();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
});

function switchMode(m) {
  mode = m;
  document.getElementById('tab-movie').classList.toggle('active', m==='movie');
  document.getElementById('tab-tv').classList.toggle('active', m==='tv');
  document.getElementById('sections').innerHTML = '';
  loadPage();
}

async function loadPage() {
  await Promise.all([loadHero(), loadSections()]);
}

// ── HERO ──────────────────────────────
async function loadHero() {
  try {
    const url = mode==='movie'
      ? `${TMDB}/trending/movie/day?api_key=${TMDB_KEY}`
      : `${TMDB}/trending/tv/day?api_key=${TMDB_KEY}`;
    const r = await fetch(url);
    const j = await r.json();
    heroItems = (j.results||[]).slice(0,8);
    if (!heroItems.length) throw new Error();
    renderHero(0);
    renderHeroDots();
    startHeroTimer();
  } catch { document.getElementById('hero-title').textContent = 'Gagal memuat'; }
}

function renderHero(i) {
  heroIdx = i;
  const a = heroItems[i]; if (!a) return;
  const bg = document.getElementById('hero-bg');
  bg.style.backgroundImage = `url(${IMG_L}${a.backdrop_path||a.poster_path||''})`;
  const title = a.title||a.name||'Unknown';
  document.getElementById('hero-title').textContent = title;
  document.getElementById('hero-overview').textContent = a.overview||'';
  document.getElementById('hero-badge').textContent = mode==='movie' ? '◉ Trending Movie' : '◈ Trending Series';
  document.getElementById('hero-meta').innerHTML = `
    ${a.vote_average?`<span class="sc">★ ${a.vote_average.toFixed(1)}</span>`:''}
    ${a.release_date||a.first_air_date?`<span>◇ ${(a.release_date||a.first_air_date||'').slice(0,4)}</span>`:''}
    ${a.original_language?`<span>◈ ${a.original_language.toUpperCase()}</span>`:''}
  `;
  document.getElementById('hero-watch').onclick = () => openPlayer(a);
  document.getElementById('hero-add').onclick   = () => toggleWL(a);
  document.querySelectorAll('.hdot').forEach((d,j)=>d.classList.toggle('active',j===i));
}

function renderHeroDots() {
  const c = document.getElementById('hero-dots');
  c.innerHTML = heroItems.map((_,i)=>`<div class="hdot${i===0?' active':''}" onclick="goHero(${i})"></div>`).join('');
}
function goHero(i){ clearInterval(heroTimer); renderHero(i); startHeroTimer(); }
function startHeroTimer(){ heroTimer=setInterval(()=>renderHero((heroIdx+1)%heroItems.length),7000); }

// ── SECTIONS ──────────────────────────
async function loadSections() {
  const cont = document.getElementById('sections');
  cont.innerHTML = '';
  const sections = mode==='movie' ? MOVIE_SECTIONS : TV_SECTIONS;
  for (const s of sections) {
    const sec = document.createElement('div');
    sec.className='section'; sec.id=`sec-${s.key}`;
    sec.innerHTML=`
      <div class="sec-hdr">
        <div class="sec-title">${s.icon} ${s.label}</div>
      </div>
      <div class="movie-row" id="row-${s.key}">
        ${[...Array(8)].map(()=>'<div class="mcard"><div class="mposter-sk"></div></div>').join('')}
      </div>
    `;
    cont.appendChild(sec);
    fetchSection(s);
    await delay(80);
  }
}

async function fetchSection(s) {
  try {
    const sep = s.url.includes('?') ? '&' : '?';
    const r = await fetch(`${s.url}${sep}api_key=${TMDB_KEY}&language=id-ID`);
    const j = await r.json();
    const list = j.results||[];
    const row = document.getElementById(`row-${s.key}`);
    if (!row) return;
    row.innerHTML = list.length ? list.map(a=>cardHTML(a)).join('') : '<div style="color:var(--text-dim);font-size:.78rem;padding:.5rem">Tidak ada data</div>';
  } catch {
    const row = document.getElementById(`row-${s.key}`);
    if (row) row.innerHTML='<div style="color:var(--text-dim);font-size:.78rem;padding:.5rem">Gagal memuat</div>';
  }
}

function cardHTML(a) {
  const title = esc(a.title||a.name||'');
  const img   = a.poster_path ? `${IMG}${a.poster_path}` : '';
  const score = a.vote_average ? a.vote_average.toFixed(1) : '';
  const year  = (a.release_date||a.first_air_date||'').slice(0,4);
  const type  = a.title ? 'Movie' : 'TV';
  const data  = JSON.stringify(a).replace(/"/g,'&quot;');
  return `
    <div class="mcard" onclick="openPlayer(${data})">
      <div style="position:relative;">
        <img class="mposter" src="${img}" alt="${title}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'140\\' height=\\'210\\'><rect width=\\'140\\' height=\\'210\\' fill=\\'%23151515\\'/><text x=\\'70\\' y=\\'110\\' fill=\\'%23333\\' text-anchor=\\'middle\\' font-size=\\'36\\'>🎬</text></svg>'"/>
        <div class="cbadge">${type}</div>
        ${score?`<div class="cscore">★ ${score}</div>`:''}
        <div class="cov-ov"><div class="play-ic">▶</div></div>
      </div>
      <div class="cinfo">
        <div class="ctitle">${title}</div>
        <div class="cmeta">${year}</div>
      </div>
    </div>
  `;
}

// ── PLAYER (Vidking) ──────────────────
async function openPlayer(item) {
  if (typeof item === 'string') { try { item=JSON.parse(item); } catch { return; } }
  const isTV   = !item.title; // TV has 'name', Movie has 'title'
  const tmdbId = item.id;
  const title  = esc(item.title||item.name||'Unknown');
  const img    = item.poster_path ? `${IMG}${item.poster_path}` : '';
  const overview = esc(item.overview||'');
  const score  = item.vote_average ? item.vote_average.toFixed(1) : '';
  const year   = (item.release_date||item.first_air_date||'').slice(0,4);

  const modal = document.getElementById('watch-modal');
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  // Build modal shell
  modal.innerHTML = `
    <div class="wm-header">
      <button class="wm-back" onclick="closeWatch()">← Kembali</button>
      <div class="wm-title">${isTV?'◈':'◉'} ${title}</div>
    </div>
    <div class="wm-body">
      <div class="player-wrap" id="player-wrap">
        <iframe id="player-iframe"
          src="${VIDKING}/${isTV?'tv':'movie'}/${tmdbId}${isTV?'/1/1':''}"
          allowfullscreen allow="autoplay; fullscreen; picture-in-picture"
          referrerpolicy="origin"
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation">
        </iframe>
      </div>
      <div class="player-info" id="player-info">
        <img class="pi-poster" src="${img}" alt="${title}"/>
        <div class="pi-title">${title}</div>
        <div class="pi-meta">
          ${score?`<span class="sc">★ ${score}</span>`:''}
          ${year?`<span>◇ ${year}</span>`:''}
          <span>${isTV?'TV Series':'Movie'}</span>
        </div>
        <div class="pi-genres" id="pi-genres"></div>
        <div class="pi-overview">${overview}</div>
        ${isTV?`<div class="seasons-wrap" id="seasons-wrap"><div class="loading-ctr"><div class="spin"></div></div></div>`:''}
      </div>
    </div>
  `;

  // Fetch extra detail
  fetchDetail(tmdbId, isTV, item);
}

async function fetchDetail(id, isTV, item) {
  try {
    const type = isTV ? 'tv' : 'movie';
    const r = await fetch(`${TMDB}/${type}/${id}?api_key=${TMDB_KEY}&language=id-ID`);
    const d = await r.json();
    // genres
    const gc = document.getElementById('pi-genres');
    if (gc) gc.innerHTML = (d.genres||[]).map(g=>`<span class="pi-genre">${g.name}</span>`).join('');
    // TV seasons
    if (isTV) renderSeasons(d, id);
  } catch {}
}

function renderSeasons(detail, id) {
  const wrap = document.getElementById('seasons-wrap');
  if (!wrap) return;
  const seasons = (detail.seasons||[]).filter(s=>s.season_number>0);
  if (!seasons.length) { wrap.innerHTML=''; return; }
  wrap.innerHTML = `
    <div class="season-label">◈ Pilih Season & Episode</div>
    <div class="season-tabs" id="season-tabs">
      ${seasons.map((s,i)=>`<button class="season-tab${i===0?' active':''}" onclick="selectSeason(${s.season_number},${id},this)">${s.name||'Season '+s.season_number}</button>`).join('')}
    </div>
    <div class="ep-list" id="ep-list">
      <div class="loading-ctr"><div class="spin"></div></div>
    </div>
  `;
  selectSeason(seasons[0].season_number, id, document.querySelector('.season-tab'));
}

async function selectSeason(sNum, tmdbId, btn) {
  document.querySelectorAll('.season-tab').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const list = document.getElementById('ep-list');
  if (list) list.innerHTML='<div class="loading-ctr"><div class="spin"></div></div>';
  try {
    const r = await fetch(`${TMDB}/tv/${tmdbId}/season/${sNum}?api_key=${TMDB_KEY}&language=id-ID`);
    const j = await r.json();
    const eps = j.episodes||[];
    if (!list) return;
    list.innerHTML = eps.map((ep,i)=>`
      <div class="ep-item${i===0?' active':''}" id="ep-${ep.episode_number}" onclick="selectEpisode(${tmdbId},${sNum},${ep.episode_number},this)">
        <div class="ep-num">${ep.episode_number}</div>
        <div class="ep-info">
          <div class="ep-ttl">${esc(ep.name||'Episode '+ep.episode_number)}</div>
          <div class="ep-sub">S${sNum} E${ep.episode_number}</div>
        </div>
        <span class="ep-play">▶</span>
      </div>
    `).join('');
  } catch {
    if (list) list.innerHTML='<div style="color:var(--text-dim);font-size:.76rem;padding:.5rem">Gagal memuat episode</div>';
  }
}

function selectEpisode(tmdbId, season, ep, el) {
  document.querySelectorAll('.ep-item').forEach(e=>e.classList.remove('active'));
  if (el) el.classList.add('active');
  const iframe = document.getElementById('player-iframe');
  if (iframe) iframe.src = `${VIDKING}/tv/${tmdbId}/${season}/${ep}`;
}

function closeWatch() {
  document.getElementById('watch-modal').classList.add('hidden');
  document.getElementById('watch-modal').innerHTML='';
  document.body.style.overflow='';
}

// ── SEARCH ────────────────────────────
function handleSearch(q) {
  clearTimeout(searchDebounce);
  const d = document.getElementById('search-drop');
  if (!q.trim()) { d.classList.add('hidden'); return; }
  d.classList.remove('hidden');
  d.innerHTML='<div class="sd-item" style="justify-content:center;opacity:.5;font-size:.76rem">Mencari...</div>';
  searchDebounce=setTimeout(()=>doSearch(q),500);
}

async function doSearch(q) {
  try {
    const type = mode==='movie' ? 'movie' : 'tv';
    const r = await fetch(`${TMDB}/search/${type}?api_key=${TMDB_KEY}&language=id-ID&query=${encodeURIComponent(q)}`);
    const j = await r.json();
    const list = j.results||[];
    const d = document.getElementById('search-drop');
    if (!d) return;
    if (!list.length) { d.innerHTML='<div class="sd-item" style="justify-content:center;font-size:.76rem;color:var(--text-dim)">Tidak ditemukan</div>'; return; }
    d.innerHTML=list.slice(0,8).map(a=>{
      const img=a.poster_path?`${IMG}${a.poster_path}`:'';
      const ttl=esc(a.title||a.name||'');
      const yr=(a.release_date||a.first_air_date||'').slice(0,4);
      const sc=a.vote_average?a.vote_average.toFixed(1):'';
      return `<div class="sd-item" onclick="sdPick(this)" data-item='${JSON.stringify(a).replace(/'/g,"&#39;")}'>
        <img src="${img}" alt="" onerror="this.style.display='none'"/>
        <div><div class="sd-title">${ttl}</div><div class="sd-meta">${yr}${sc?' · ★'+sc:''}</div></div>
      </div>`;
    }).join('');
  } catch {}
}

function sdPick(el) {
  const a=JSON.parse(el.dataset.item);
  document.getElementById('search-drop').classList.add('hidden');
  document.getElementById('search-input').value='';
  openPlayer(a);
}

document.addEventListener('click',e=>{
  const d=document.getElementById('search-drop');
  const i=document.getElementById('search-input');
  if (d&&!d.contains(e.target)&&e.target!==i) d.classList.add('hidden');
});

// ── WATCHLIST ─────────────────────────
function toggleWL(item) {
  const id=item.id;
  const idx=watchlist.findIndex(a=>a.id===id);
  if (idx===-1) { watchlist.push({id,title:item.title||item.name,poster:item.poster_path,score:item.vote_average,year:(item.release_date||item.first_air_date||'').slice(0,4),isTV:!item.title}); showToast('⊕ Ditambahkan ke Watchlist'); }
  else           { watchlist.splice(idx,1); showToast('✕ Dihapus dari Watchlist'); }
  localStorage.setItem('jcz_mv_wl',JSON.stringify(watchlist));
}

function showWatchlist() {
  hidePage();document.getElementById('watchlist-page').classList.remove('hidden');
  setNav('bn-wl');renderWL();
}

function renderWL() {
  const c=document.getElementById('wl-content');
  if (!watchlist.length){c.innerHTML='<div class="empty-state"><span class="empty-icon">⊕</span><p>Belum ada film/series di watchlist</p></div>';return;}
  c.innerHTML=`<div class="wl-grid">${watchlist.map(a=>{
    const img=a.poster?`${IMG}${a.poster}`:'';
    const data=JSON.stringify({id:a.id,title:a.title,poster_path:a.poster,vote_average:a.score,release_date:a.year,name:a.isTV?a.title:undefined}).replace(/"/g,'&quot;');
    return `<div class="mcard" onclick="openPlayer(${data})">
      <div style="position:relative;">
        <img class="mposter" src="${img}" alt="${esc(a.title||'')}"/>
        ${a.score?`<div class="cscore">★ ${parseFloat(a.score).toFixed(1)}</div>`:''}
        <div class="cov-ov"><div class="play-ic">▶</div></div>
      </div>
      <div class="cinfo"><div class="ctitle">${esc(a.title||'')}</div><div class="cmeta">${a.year||''}</div></div>
    </div>`;
  }).join('')}</div>`;
}

function showHome(){hidePage();document.getElementById('home-page').classList.remove('hidden');setNav('bn-home');}
function hidePage(){['home-page','watchlist-page'].forEach(id=>document.getElementById(id).classList.add('hidden'));}
function focusSearch(){showHome();document.getElementById('search-input').focus();setNav('bn-search');}
function setNav(id){document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));const el=document.getElementById(id);if(el)el.classList.add('active');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
</html>
